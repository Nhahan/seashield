[SystemSettings]
; 8.2 km water zone => 800 quadtree tiles; the platform default cap (256)
; would bias the tiles and break the surface up.
r.Water.WaterMesh.MaxWidthInTiles=1024
; The default CustomRenderPasses water-info path (2) leaves a dead square of
; missing surface around the zone center on Metal/macOS; the legacy Custom
; path renders it correctly.
r.Water.WaterInfo.RenderMethod=1

[/Script/Engine.CollisionProfile]
; The Water plugin requires this profile and refuses to cook without it
; (interactive "add to DefaultEngine.ini?" prompt in the editor becomes a
; hard error in -unattended cooks). Mirrors the entry the plugin's own
; AddWaterCollisionProfile action writes (WaterEditorModule.cpp).
+Profiles=(Name="WaterBodyCollision",CollisionEnabled=QueryOnly,bCanModify=False,ObjectTypeName="WorldStatic",CustomResponses=((Channel="Visibility",Response=ECR_Ignore),(Channel="Camera",Response=ECR_Ignore),(Channel="WorldDynamic",Response=ECR_Overlap),(Channel="Pawn",Response=ECR_Overlap),(Channel="PhysicsBody",Response=ECR_Overlap),(Channel="Destructible",Response=ECR_Overlap),(Channel="Vehicle",Response=ECR_Overlap)),HelpMessage="Default Water Collision Profile (Created by Water Plugin)")

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/SeaShield/Maps/L_Range.L_Range
EditorStartupMap=/Game/SeaShield/Maps/L_Range.L_Range
GlobalDefaultGameMode=/Script/SeaShield.SeaShieldGameModeBase

