[SystemSettings]
; 8.2 km water zone => 800 quadtree tiles; the platform default cap (256)
; would bias the tiles and break the surface up.
r.Water.WaterMesh.MaxWidthInTiles=1024
; The default CustomRenderPasses water-info path (2) leaves a dead square of
; missing surface around the zone center on Metal/macOS; the legacy Custom
; path renders it correctly.
r.Water.WaterInfo.RenderMethod=1
; Water geometry budget (perf-report.md client §; measured with perf_capture.sh).
; The gerstner quadtree was 121 ms = 93% of the 1440p GPU frame — a 40 ms depth
; prepass + 81 ms draw, both geometry-bound. These three scalability biases bias
; the baked component values down (effective tessellation 10->4, LODScale
; 1.5->1.0, one fewer LOD level), collapsing water to ~1.5 ms with no visible
; loss at the camera's sea-level framing. NOTE: the distant-water anti-patterning
; lives in the MI_SeaOcean material (distant-normal flatten + roughness), NOT in
; the LOD rings — so pulling the rings IN (negative LODScaleBias, was +0.5) is
; safe; verified by horizon capture.
r.Water.WaterMesh.TessFactorBias=-6
r.Water.WaterMesh.LODScaleBias=-0.5
r.Water.WaterMesh.LODCountBias=-1
; Volumetric cloud was 8 ms at native 1440p (quarter-res trace is march-bound,
; not sample-bound: shadow/AO/sample-cap cuts did nothing). Mode 2 (trace quarter
; + reconstruct at Scale) at 0.5 scale drops it to ~3 ms; the sky clouds never
; intersect opaque geometry at the horizon, so mode 2's no-opaque-intersection
; limitation is invisible here. Verified by sky capture.
r.VolumetricRenderTarget.Mode=2
r.VolumetricRenderTarget.Scale=0.5
; Internal render scale (TSR upsamples to 1440p). The third-person camera looks
; ACROSS the sea (SingleLayerWater ~6.7 ms is the dominant GPU cost), so native
; 1440p lands ~48.5 fps. Per the 50 fps quality target, 90% + TSR is the sweet
; spot: ~55 fps cooled (p99 21 ms, max 20.7) and still ~50 fps under sustained-
; load thermal drift, with near-native sharpness (Tonemapper.Sharpen=0.8 offsets
; the upscale). Native (100%)=48.5 fps cooled would dip BELOW the floor when the
; GPU is hot; 90% holds it with margin. Numbers are cooled, thermally-fair
; measurements — back-to-back GPU runs throttle and read low (performance-report
; §6.4). Overrides the stale auto-benchmark.
r.ScreenPercentage=90
; Water reflection/refraction at half res — big SingleLayerWater saving, invisible
; on the calm sea (the costliest part of the water shading).
r.Water.SingleLayer.Reflection.DownsampleFactor=2
r.Water.SingleLayer.RefractionDownsampleFactor=2
; Cheap clouds in the SkyLight real-time env-capture / reflections (the cubemap
; recapture rendered clouds per face = an ~18 ms periodic spike); few samples there
; are imperceptible in a reflection.
r.VolumetricCloud.ReflectionRaySampleMaxCount=24
; The real-time SkyLight reflection capture re-renders the sky (6 cube faces +
; a convolution) into the reflection cubemap; doing it all in one frame is an
; ~18 ms periodic spike (the p99 tail). TimeSlice spreads it across frames so no
; single frame eats the whole cost; paired with the 64-px cubemap (setup_level.py /
; patch_level.py) the spike is gone (performance-report §6.4).
r.SkyLight.RealTimeReflectionCapture.TimeSlice=1
; Tonemapper sharpen counters the slight softening from the TSR upscale (internal
; render below 1440p) so the third-person output stays crisp.
r.Tonemapper.Sharpen=0.8
; TSR tolerance for the per-frame Gerstner normal oscillation — fewer rejected
; samples = less far-water specular shimmer (which reads as a moving pattern).
r.TSR.ShadingRejection.Flickering.Period=4
; UE5.8 Volumetric Fog — god-ray sea mist driven by the seed weather, enabled on the gameplay
; L_Range height fog (patch_level.py / setup_level.py `enable_volumetric_fog`). The froxel grid
; cost is CONSTANT per frame (density-independent), and the M4 Max auto-benchmark would pick the
; Epic bucket (8 px / 128 Z) — too heavy for the tight 1440p60 budget. Pin a cheaper tier here
; (overrides the scalability bucket); the exact tier is perf-gated to the 40 fps floor by
; perf_capture.sh (see performance-report). 16 px / 64 Z = the engine High bucket.
r.VolumetricFog.GridPixelSize=16
r.VolumetricFog.GridSizeZ=64

[/Script/Engine.CollisionProfile]
; The Water plugin requires this profile and refuses to cook without it
; (interactive "add to DefaultEngine.ini?" prompt in the editor becomes a
; hard error in -unattended cooks). Mirrors the entry the plugin's own
; AddWaterCollisionProfile action writes (WaterEditorModule.cpp).
+Profiles=(Name="WaterBodyCollision",CollisionEnabled=QueryOnly,bCanModify=False,ObjectTypeName="WorldStatic",CustomResponses=((Channel="Visibility",Response=ECR_Ignore),(Channel="Camera",Response=ECR_Ignore),(Channel="WorldDynamic",Response=ECR_Overlap),(Channel="Pawn",Response=ECR_Overlap),(Channel="PhysicsBody",Response=ECR_Overlap),(Channel="Destructible",Response=ECR_Overlap),(Channel="Vehicle",Response=ECR_Overlap)),HelpMessage="Default Water Collision Profile (Created by Water Plugin)")

